<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arara de Cartola | Commissions</title>
    
    <!-- Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            --bg-color: #1a1614; 
            --card-bg: #2a2420;
            --accent-color: #a68966;
            --accent-hover: #c4a47c;
            --text-main: #d9d0c7;
            --text-dim: #8c7e74;
            --border-color: #3d352e;
            --radius-full: 50px;
            --radius-md: 20px;
            --radius-sm: 8px;
            --shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow-x: hidden;
            line-height: 1.6;
        }

        header { text-align: center; padding: 80px 20px 40px 20px; }

        .logo-container {
            width: 140px; height: 140px;
            background: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            margin: 0 auto 30px auto;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        .brand-name {
            font-size: 2.5rem; color: var(--accent-color);
            letter-spacing: 6px; text-transform: uppercase; margin: 0;
            font-weight: 900;
        }

        nav {
            display: flex; justify-content: center; gap: 15px; padding: 20px;
            background: rgba(26, 22, 20, 0.95);
            backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }

        nav button {
            background: none; border: none; color: var(--text-dim);
            font-size: 0.9rem; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
            padding: 12px 24px;
            border-radius: var(--radius-full);
        }

        nav button.active { color: var(--accent-color); background: rgba(166, 137, 102, 0.15); }
        nav button:hover:not(.active) { color: var(--text-main); }

        .container { max-width: 1100px; margin: 40px auto 100px auto; padding: 0 25px; }

        .view { display: none; opacity: 0; transform: scale(0.98); transition: all 0.5s ease; }
        .view.active { 
            display: block; 
            opacity: 1; 
            transform: scale(1); 
            animation: smoothFadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; 
        }

        @keyframes smoothFadeIn { 
            from { opacity: 0; transform: scale(0.98) translateY(10px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }

        /* --- LISTA DE PREÇOS --- */
        .price-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            padding: 20px 0;
            max-width: 900px; 
            margin: 0 auto; 
        }
        
        .card {
            background: var(--card-bg); 
            border-left: 5px solid var(--accent-color); 
            padding: 25px 35px; 
            border-radius: 4px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .card:hover { 
            transform: translateX(10px); 
            box-shadow: var(--shadow);
            border-left-width: 10px; 
        }

        .price-tag { 
            color: var(--accent-color); 
            font-weight: 900; 
            font-size: 1rem; 
            display: block; 
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card h2 {
            font-size: 1.6rem; 
            margin-top: 0;
            margin-bottom: 10px; 
            font-weight: 800; 
            color: #ffffff;
        }

        .card-desc {
            color: var(--text-main);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .card-desc ul {
            margin: 0;
            padding-left: 20px;
            list-style-type: disc;
        }
        .card-desc li {
            margin-bottom: 4px;
            color: var(--text-main);
        }
        
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 40px; }
        
        .model-card {
            background: var(--card-bg); border-radius: var(--radius-md); overflow: hidden;
            border: 1px solid var(--border-color); display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: 0.3s ease;
        }
        .model-card:hover { border-color: var(--accent-color); }

        .preview-area { width: 100%; height: 400px; background-color: #120f0e; overflow: hidden; position: relative; }
        .preview-area model-viewer, .preview-area img, .preview-area iframe {
            width: 100%; height: 100%; border: none; object-fit: contain;
        }

        .model-info { padding: 30px; }
        .model-info h3 { margin: 0 0 12px 0; font-size: 1.6rem; color: var(--accent-color); font-weight: 800; }

        .itens-container {
            display: flex; gap: 14px; margin-top: 25px; flex-wrap: wrap;
        }

        .item-btn {
            width: 52px; height: 52px; border-radius: 14px; 
            border: 2px solid var(--border-color); cursor: pointer;
            background-color: var(--bg-color);
            background-size: cover; background-position: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            color: var(--text-dim); display: grid; place-items: center; font-size: 0.8rem;
            font-weight: bold;
        }

        .item-btn:hover { border-color: var(--accent-color); transform: translateY(-3px); }
        .item-btn.active { border-color: var(--accent-color); background-color: rgba(166, 137, 102, 0.2); color: var(--accent-color); box-shadow: 0 0 15px rgba(166, 137, 102, 0.3); }

        footer { text-align: center; padding: 100px 40px; color: var(--text-dim); font-size: 0.9rem; }

        .btn-admin {
            background: transparent; border: 1px solid var(--border-color); color: var(--text-dim);
            padding: 12px 30px; border-radius: var(--radius-full); cursor: pointer; transition: 0.3s; margin-top: 30px;
            font-weight: 700; font-size: 0.85rem; letter-spacing: 1px;
        }
        .btn-admin:hover { border-color: var(--accent-color); color: var(--accent-color); background: rgba(166, 137, 102, 0.05); }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center;
            z-index: 9999; opacity: 0; pointer-events: none; transition: 0.4s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        
        .modal-box {
            background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 45px; border-radius: 30px; width: 90%; max-width: 480px; max-height: 90vh; 
            overflow-y: auto; box-shadow: var(--shadow);
        }
        .modal-box.large { max-width: 950px; }
        .modal-box h3 { margin-top: 0; font-size: 1.8rem; color: var(--accent-color); margin-bottom: 30px; }
        
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 0.9rem; color: var(--text-dim); margin-bottom: 10px; font-weight: 700; }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%; padding: 16px 20px; border-radius: 16px;
            border: 2px solid var(--border-color); background: var(--bg-color);
            color: var(--text-main); font-family: inherit; outline: none; box-sizing: border-box;
            transition: all 0.3s;
        }
        
        .modal-actions { display: flex; gap: 15px; margin-top: 35px; }
        .modal-actions button { 
            flex: 1; padding: 16px; cursor: pointer; border-radius: var(--radius-full); 
            border: none; font-weight: 800; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary { background: var(--accent-color); color: var(--bg-color); }
        .btn-ghost { background: transparent; color: var(--text-dim); border: 2px solid var(--border-color); }
        .btn-danger { background: #4a1c1c; color: #ff9e9e; }

        .edit-control-panel {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(150px);
            background: var(--card-bg); border: 2px solid var(--accent-color);
            padding: 15px 15px 15px 30px; border-radius: var(--radius-full); display: flex; align-items: center; gap: 20px;
            z-index: 1000; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--shadow);
        }
        .edit-control-panel.active { transform: translateX(-50%) translateY(0); }
        .editable.editing { outline: 2px dashed var(--accent-color); outline-offset: 4px; cursor: text; border-radius: 4px; }

        .media-row { 
            background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; 
            margin-bottom: 15px; border: 1px solid var(--border-color);
            display: grid; grid-template-columns: 1fr 2fr 1fr auto; gap: 15px; align-items: end;
        }

        @media (max-width: 768px) {
            .brand-name { font-size: 1.8rem; }
            .card { padding: 20px; }
            .edit-control-panel { flex-direction: column; width: 80%; transform: translateX(-50%) translateY(300px); }
            .media-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img id="main-logo" src="fuur" alt="Logo">
        </div>
        <h1 class="brand-name editable" id="text-brand">Arara de Cartola</h1>
        <p class="editable" id="text-subtitle" style="color: var(--text-dim); font-weight: 600; margin-top: 15px; font-size: 1.1rem; letter-spacing: 1px;">Minecraft Skin & Model Commissions</p>
    </header>

    <nav>
        <button onclick="showView('prices')" id="btn-prices" class="active">Preços</button>
        <button onclick="showView('portfolio')" id="btn-portfolio">Portfólio</button>
    </nav>

    <div class="container">
        <section id="view-prices" class="view active">
            <div class="price-grid" id="prices-container"></div>
        </section>

        <section id="view-portfolio" class="view">
            <h2 class="editable" id="text-port-title" style="text-align: center; color: var(--accent-color); margin-bottom: 50px; font-size: 2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 3px;">Showcase</h2>
            <div class="portfolio-grid" id="portfolio-container"></div>
        </section>
    </div>

    <footer>
        <div class="editable" id="text-status" style="font-weight: 800; font-size: 1.2rem; margin-bottom: 15px; letter-spacing: 1px;">Status: <span style="color:#4ecb71">🟢 ABERTO</span></div>
        <p class="editable" id="text-footer">© 2026 Arara de Cartola •</p>
        <button class="btn-admin" onclick="openLoginModal()">Painel Admin</button>
    </footer>

    <!-- MODAIS ADMIN -->
    <div id="loginModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Login Admin</h3>
            <div class="input-group"><label>Usuário</label><input type="text" id="usernameInput"></div>
            <div class="input-group"><label>Senha</label><input type="password" id="passwordInput"></div>
            <div class="modal-actions">
                <button class="btn-ghost" onclick="closeModals()">Voltar</button>
                <button class="btn-primary" onclick="verifyLogin()">Entrar</button>
            </div>
        </div>
    </div>

    <div id="portfolioListModal" class="modal-overlay">
        <div class="modal-box large">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0">Gerir Portfólio</h3>
                <button class="btn-primary" style="padding:10px 20px; font-size:0.8rem;" onclick="openPortfolioEditor(null)">+ Novo Modelo</button>
            </div>
            <div id="pm-list-container"></div>
            <div class="modal-actions"><button class="btn-ghost" onclick="closeModals()">Fechar</button></div>
        </div>
    </div>

    <div id="portfolioEditorModal" class="modal-overlay" style="z-index:10001">
        <div class="modal-box large">
            <h3>Editor de Modelo</h3>
            <input type="hidden" id="pm-id">
            <div class="input-group"><label>Título</label><input type="text" id="pm-titulo"></div>
            <div class="input-group"><label>Descrição</label><textarea id="pm-descricao" rows="2"></textarea></div>
            
            <label style="display:block; margin-bottom:10px; font-weight:bold;">Mídias (Arquivos .glb ou Imagens)</label>
            <div id="pm-medias-container"></div>
            <button class="btn-ghost" style="width:100%; border-style:dashed;" onclick="addMediaRow()">+ Adicionar Camada de Mídia</button>

            <div class="modal-actions">
                <button class="btn-ghost" onclick="document.getElementById('portfolioEditorModal').classList.remove('active')">Cancelar</button>
                <button class="btn-primary" onclick="saveModelData()">Guardar</button>
            </div>
        </div>
    </div>

    <div id="pricesListModal" class="modal-overlay">
        <div class="modal-box large">
            <h3>Gerir Preços</h3>
            <div id="price-list-container"></div>
            <div class="modal-actions"><button class="btn-ghost" onclick="closeModals()">Fechar</button></div>
        </div>
    </div>

    <div id="priceEditorModal" class="modal-overlay" style="z-index:10001">
        <div class="modal-box">
            <h3>Editar Preço</h3>
            <input type="hidden" id="pr-id">
            <div class="input-group"><label>Valor</label><input type="text" id="pr-valor"></div>
            <div class="input-group"><label>Título</label><input type="text" id="pr-titulo"></div>
            <div class="input-group"><label>Descrição (HTML permitido)</label><textarea id="pr-descricao" rows="5"></textarea></div>
            <div class="modal-actions">
                <button class="btn-ghost" onclick="document.getElementById('priceEditorModal').classList.remove('active')">Cancelar</button>
                <button class="btn-primary" onclick="savePriceData()">Guardar</button>
            </div>
        </div>
    </div>

    <div id="editControlPanel" class="edit-control-panel">
        <span>Modo Admin</span>
        <button class="btn-ghost" onclick="openPortfolioManager()">Portfólio</button>
        <button class="btn-ghost" onclick="openPricesManager()">Preços</button>
        <button class="btn-primary" onclick="toggleEditMode()">Guardar Alterações</button>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://afrhflyibkjywsuefgno.supabase.co' 
        const SUPABASE_KEY = 'sb_publishable_oteHwr_i_hGi8SFBDzZCmA_K5z7hjG5'
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

        const DEFAULT_PRICES = [
            { id: 1, valor: "$25 - $100", titulo: "Base Model", descricao: "<ul><li>Basic animations included: Blink, Breathing, Hair, Wings.</li><li>Expressions: Angry, Sad, Happy, Confused.</li><li>Textures: 128x128 or 256x256.</li></ul>" },
            { id: 2, valor: "$25 - $60", titulo: "Basic Animations", descricao: "<ul><li>Walking, jumping, running, falling.</li><li>Price may increase with complexity.</li></ul>" },
            { id: 3, valor: "$5 - $25", titulo: "Custom Gestures", descricao: "<ul><li>Poses, short scenes, specific emotions.</li></ul>" },
            { id: 4, valor: "$3 - $15", titulo: "Add-ons", descricao: "<ul><li>Accessories (horns, belt, necklaces, masks).</li><li>Alternative costumes.</li></ul>" }
        ];

        window.meusModelos = [];
        window.meusPrecos = [...DEFAULT_PRICES];

        window.showView = (name) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+name).classList.add('active');
            document.getElementById('btn-'+name).classList.add('active');
        }

        window.mudarMidia = (id, tipo, url, btn) => {
            const area = document.getElementById(`media-${id}`);
            if(tipo === '3d') area.innerHTML = `<model-viewer src="${url}" auto-rotate camera-controls autoplay shadow-intensity="1"></model-viewer>`;
            else if(tipo === 'img') area.innerHTML = `<img src="${url}">`;
            else area.innerHTML = `<iframe src="${url}"></iframe>`;
            
            btn.parentElement.querySelectorAll('.item-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        window.carregarPortfolio = () => {
            const container = document.getElementById('portfolio-container');
            container.innerHTML = window.meusModelos.map(m => `
                <div class="model-card">
                    <div class="preview-area" id="media-${m.id}">
                        ${m.itens[0]?.tipo === '3d' ? `<model-viewer src="${m.itens[0].arquivo}" auto-rotate camera-controls shadow-intensity="1"></model-viewer>` : `<img src="${m.itens[0].arquivo}">`}
                    </div>
                    <div class="model-info">
                        <h3>${m.titulo}</h3>
                        <p>${m.descricao}</p>
                        <div class="itens-container">
                            ${m.itens.map((it, idx) => `
                                <div class="item-btn ${idx===0?'active':''}" 
                                     style="${it.icone?`background-image:url('${it.icone}')`:''}" 
                                     onclick="mudarMidia(${m.id}, '${it.tipo}', '${it.arquivo}', this)">
                                     ${it.icone?'':it.tipo.toUpperCase()}
                                </div>`).join('')}
                        </div>
                    </div>
                </div>`).join('');
        }

        window.carregarPrecos = () => {
            const container = document.getElementById('prices-container');
            container.innerHTML = window.meusPrecos.map(p => `
                <div class="card">
                    <span class="price-tag">${p.valor}</span>
                    <h2>${p.titulo}</h2>
                    <div class="card-desc">${p.descricao}</div>
                </div>`).join('');
        }

        async function loadData() {
            const { data } = await supabase.from('site_content').select('*');
            if(data) {
                data.forEach(r => {
                    const el = document.getElementById(r.element_id);
                    if(r.element_id === 'portfolio_data') window.meusModelos = JSON.parse(r.content);
                    else if(r.element_id === 'prices_data') {
                        const saved = JSON.parse(r.content);
                        if(saved[0]?.descricao.includes('<ul>')) window.meusPrecos = saved;
                    } else if(el) {
                        if(el.tagName === 'IMG') el.src = r.content;
                        else el.innerHTML = r.content;
                    }
                });
            }
            window.carregarPortfolio();
            window.carregarPrecos();
        }

        window.openLoginModal = () => document.getElementById('loginModal').classList.add('active');
        window.closeModals = () => document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
        
        window.verifyLogin = () => {
            if(document.getElementById('usernameInput').value === 'admin' && document.getElementById('passwordInput').value === 'admin123') {
                closeModals(); toggleEditMode();
            }
        };

        window.toggleEditMode = async () => {
            window.isEditModeActive = !window.isEditModeActive;
            const panel = document.getElementById('editControlPanel');
            const editables = document.querySelectorAll('.editable');
            if(window.isEditModeActive) {
                panel.classList.add('active');
                editables.forEach(el => { el.classList.add('editing'); el.contentEditable = true; });
            } else {
                panel.classList.remove('active');
                editables.forEach(el => { el.classList.remove('editing'); el.contentEditable = false; });
                for(const el of editables) await supabase.from('site_content').upsert({ element_id: el.id, content: el.innerHTML });
                await supabase.from('site_content').upsert({ element_id: 'prices_data', content: JSON.stringify(window.meusPrecos) });
                await supabase.from('site_content').upsert({ element_id: 'portfolio_data', content: JSON.stringify(window.meusModelos) });
            }
        }

        // --- GESTÃO PORTFÓLIO ---
        window.openPortfolioManager = () => {
            document.getElementById('pm-list-container').innerHTML = window.meusModelos.map(m => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; padding:15px; background:rgba(0,0,0,0.2); border-radius:10px; align-items:center;">
                    <span>${m.titulo}</span>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-ghost" onclick="openPortfolioEditor(${m.id})">EDITAR</button>
                        <button class="btn-danger" onclick="deleteModel(${m.id})">APAGAR</button>
                    </div>
                </div>`).join('');
            document.getElementById('portfolioListModal').classList.add('active');
        }

        window.openPortfolioEditor = (id) => {
            const m = id ? window.meusModelos.find(x => x.id === id) : null;
            document.getElementById('pm-id').value = id || "new";
            document.getElementById('pm-titulo').value = m ? m.titulo : "";
            document.getElementById('pm-descricao').value = m ? m.descricao : "";
            document.getElementById('pm-medias-container').innerHTML = "";
            if(m) m.itens.forEach(it => addMediaRow(it.tipo, it.arquivo, it.icone));
            else addMediaRow();
            document.getElementById('portfolioEditorModal').classList.add('active');
        }

        window.addMediaRow = (tipo='3d', url='', ico='') => {
            const div = document.createElement('div');
            div.className = 'media-row';
            div.innerHTML = `
                <div class="input-group" style="margin:0"><label>Tipo</label><select class="m-tipo"><option value="3d" ${tipo==='3d'?'selected':''}>3D (.glb)</option><option value="img" ${tipo==='img'?'selected':''}>Imagem</option></select></div>
                <div class="input-group" style="margin:0"><label>URL Arquivo</label><input type="text" class="m-url" value="${url}"></div>
                <div class="input-group" style="margin:0"><label>URL Ícone</label><input type="text" class="m-ico" value="${ico}"></div>
                <button class="btn-danger" style="padding:10px" onclick="this.parentElement.remove()">X</button>`;
            document.getElementById('pm-medias-container').appendChild(div);
        }

        window.saveModelData = () => {
            const idVal = document.getElementById('pm-id').value;
            const itens = Array.from(document.querySelectorAll('.media-row')).map(r => ({
                tipo: r.querySelector('.m-tipo').value,
                arquivo: r.querySelector('.m-url').value,
                icone: r.querySelector('.m-ico').value
            }));
            const data = {
                id: idVal === "new" ? Date.now() : parseInt(idVal),
                titulo: document.getElementById('pm-titulo').value,
                descricao: document.getElementById('pm-descricao').value,
                itens: itens
            };
            if(idVal === "new") window.meusModelos.push(data);
            else window.meusModelos[window.meusModelos.findIndex(x => x.id === data.id)] = data;
            document.getElementById('portfolioEditorModal').classList.remove('active');
            window.carregarPortfolio();
            openPortfolioManager();
        }

        window.deleteModel = (id) => {
            if(!confirm("Apagar este modelo?")) return;
            window.meusModelos = window.meusModelos.filter(x => x.id !== id);
            window.carregarPortfolio();
            openPortfolioManager();
        }

        // --- GESTÃO PREÇOS ---
        window.openPricesManager = () => {
            document.getElementById('price-list-container').innerHTML = window.meusPrecos.map(p => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; padding:15px; background:rgba(0,0,0,0.2); border-radius:10px;">
                    <span>${p.titulo}</span>
                    <button class="btn-ghost" onclick="openPriceEditor(${p.id})">EDITAR</button>
                </div>`).join('');
            document.getElementById('pricesListModal').classList.add('active');
        }

        window.openPriceEditor = (id) => {
            const p = window.meusPrecos.find(x => x.id === id);
            document.getElementById('pr-id').value = id;
            document.getElementById('pr-valor').value = p.valor;
            document.getElementById('pr-titulo').value = p.titulo;
            document.getElementById('pr-descricao').value = p.descricao;
            document.getElementById('priceEditorModal').classList.add('active');
        }

        window.savePriceData = () => {
            const id = parseInt(document.getElementById('pr-id').value);
            const idx = window.meusPrecos.findIndex(x => x.id === id);
            window.meusPrecos[idx] = {
                id: id, valor: document.getElementById('pr-valor').value,
                titulo: document.getElementById('pr-titulo').value, descricao: document.getElementById('pr-descricao').value
            };
            document.getElementById('priceEditorModal').classList.remove('active');
            window.carregarPrecos();
            openPricesManager();
        }

        window.addEventListener('load', loadData);
    </script>
</body>
</html>
